<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · One Million Beer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#FAC775;--amber-dark:#412402;
  --bg:#fff;--bg-2:#f7f5f0;--bg-3:#eceae3;
  --text:#1a1917;--text-2:#6b6960;--text-3:#9c9a92;
  --border:rgba(0,0,0,0.09);--border-2:rgba(0,0,0,0.15);
  --red-bg:#FCEBEB;--red-tx:#791F1F;--grn-bg:#EAF3DE;--grn-tx:#27500A;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1b1a17;--bg-2:#232219;--bg-3:#2c2b25;
  --text:#f0ede5;--text-2:#9d9a91;--text-3:#6a6860;
  --border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);
  --red-bg:#3a1515;--red-tx:#f5a0a0;--grn-bg:#192e10;--grn-tx:#9fd070
}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:var(--bg-2);border-radius:16px;padding:2rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{font-size:32px;margin-bottom:1rem}
h1{font-size:18px;font-weight:700;margin-bottom:.25rem}
.sub{font-size:13px;color:var(--text-2);margin-bottom:1.5rem;line-height:1.5}
label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
input[type=password],input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border-2);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;margin-bottom:1rem}
input:focus{border-color:var(--amber)}
.drop-zone{border:2px dashed var(--border-2);border-radius:10px;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:.15s;background:var(--bg);margin-bottom:1rem}
.drop-zone:hover,.drop-zone.drag{background:var(--bg-3);border-color:var(--amber)}
.drop-icon{font-size:28px;margin-bottom:.5rem}
.drop-title{font-size:14px;font-weight:500;margin-bottom:4px}
.drop-hint{font-size:12px;color:var(--text-2)}
#file-input{display:none}
.btn{width:100%;background:var(--amber);border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:600;color:var(--amber-dark);cursor:pointer;font-family:var(--font);transition:.1s}
.btn:hover{background:#f5b84e}.btn:disabled{opacity:.4;cursor:not-allowed}
.progress{height:4px;background:var(--bg-3);border-radius:4px;margin-top:1rem;overflow:hidden;display:none}
.progress-bar{height:100%;background:var(--amber);width:0;transition:width .3s}
.msg{border-radius:8px;padding:.75rem 1rem;font-size:13px;margin-top:1rem;line-height:1.5;display:none}
.msg.ok{background:var(--grn-bg);color:var(--grn-tx);display:block}
.msg.err{background:var(--red-bg);color:var(--red-tx);display:block}
.step{font-size:12px;color:var(--text-3);margin-top:.75rem;text-align:center;min-height:18px}
.back{display:block;text-align:center;margin-top:1.25rem;font-size:12px;color:var(--text-3);text-decoration:none}
.back:hover{color:var(--text-2)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🍺</div>
  <h1>One Million Beer · Admin</h1>
  <p class="sub">Upload a new WhatsApp export to update the leaderboard and history for everyone.</p>

  <div id="login-section">
    <label for="pw">GitHub Token</label>
    <input type="password" id="pw" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    <label for="repo">Repository</label>
    <input type="text" id="repo" value="jhildebrandxi/OneMillionBeer">
    <button class="btn" onclick="doLogin()">Connect</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <div id="upload-section" style="display:none">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">📂</div>
      <p class="drop-title">Drop WhatsApp export here or click</p>
      <p class="drop-hint">.txt file · with or without media</p>
    </div>
    <input type="file" id="file-input" accept=".txt">
    <button class="btn" id="upload-btn" onclick="doUpload()" disabled>Process & upload</button>
    <div class="progress" id="progress"><div class="progress-bar" id="pbar"></div></div>
    <p class="step" id="step-text"></p>
    <div class="msg" id="upload-msg"></div>
    <div id="recap-box" style="display:none;margin-top:1rem">
      <label>Weekly recap message — copy into the group</label>
      <textarea id="recap-text" readonly style="width:100%;min-height:170px;background:var(--bg);border:1px solid var(--border-2);border-radius:8px;padding:10px 12px;font-size:13px;font-family:var(--font);color:var(--text);resize:vertical"></textarea>
      <button class="btn" style="margin-top:8px" onclick="copyRecap()">📋 Copy message</button>
    </div>
  </div>

  <a href="index.html" class="back">← Back to dashboard</a>
</div>

<script>
// ---------- shared date/clean helpers ----------
const clean = s => s.replace(/^[\u200e\u200f\u202f\ufeff]+/,'').trim();
const MSG_RE = /^\[(\d{1,2}\.\d{1,2}\.\d{2,4}),\s*\d{1,2}:\d{2}(?::\d{2})?\]\s*(.+?):\s*(.*)/;
const NUM_RE = /^[~#\s]*(\d{1,2}\.?\d{3}(?:\.\d{3})?|\d{3,6})\D*$/u;
const JOIN_RE = /hat\s+(.+?)\s+hinzugef/i;
const SKIP = ['hat die Gruppe','hat die Gruppenbesch','Nachrichten und Anrufe','wurde bearbeitet',
  'hat angefragt','hat die Genehm','festgelegt','hat das Gruppen',
  'hat in den Einstellungen','aktiviert','Ende-zu-Ende'];

function parseDate(ds) {
  const p = ds.split('.');
  try { const y=p[2].length===2?2000+ +p[2]: +p[2]; return new Date(y,+p[1]-1,+p[0]); }
  catch { return null; }
}
function fmt(d) {
  return d ? d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '?';
}
function dayKeyOf(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function calcStreak(dayArr) {
  if (!dayArr || dayArr.length === 0) return 0;
  const days = dayArr.map(d => new Date(d)).sort((a,b) => a-b);
  let max=1, cur=1;
  for (let i=1; i<days.length; i++) {
    const diff = Math.round((days[i]-days[i-1]) / 86400000);
    if (diff === 1) { cur++; if(cur>max) max=cur; }
    else cur=1;
  }
  return max;
}

// Current streak: consecutive days ending at globalMaxDate (the most recent day
// with ANY activity in the group). If the member hasn't posted yet on globalMaxDate
// (e.g. it's still early in the day), count from the day before instead of showing 0 —
// the streak up to yesterday still counts.
function calcCurrentStreak(dayArr, globalMaxDate) {
  if (!dayArr || dayArr.length === 0 || !globalMaxDate) return 0;
  const daySet = new Set(dayArr);
  let cursor = new Date(globalMaxDate);
  if (!daySet.has(dayKeyOf(cursor))) {
    cursor.setDate(cursor.getDate() - 1);
  }
  let count = 0;
  while (daySet.has(dayKeyOf(cursor))) {
    count++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return count;
}

// ---------- members.json builder (unchanged logic) ----------
function parseExport(text) {
  const lines = text.split('\n');
  const posts={}, lastD={}, firstD={}, joinD={}, dailyPosts={};
  const lastEvent={};
  const postEvents=[]; // {name, date} for every valid counter post — used for weekly top3
  let groupCreated = null;

  for (const raw of lines) {
    const line = clean(raw);
    const m = MSG_RE.exec(line);
    if (!m) continue;
    const [, dateStr, sender, rawContent] = m;
    const snd=sender.trim(), cont=clean(rawContent), d=parseDate(dateStr);
    if (!d) continue;

    if (cont.includes('erstellt') && !groupCreated) { groupCreated=d; continue; }

    if (cont.includes('hinzugefügt') || cont.includes('beigetreten')) {
      const jm=JOIN_RE.exec(cont);
      if (jm) {
        const added=jm[1].trim();
        if (!joinD[added]) joinD[added]=d;
        lastEvent[added]='join';
      }
      if (cont.includes('beigetreten')) {
        if (!joinD[snd]) joinD[snd]=d;
        lastEvent[snd]='join';
      }
      continue;
    }

    if (cont.includes('hat die Gruppe verlassen')) { lastEvent[snd]='leave'; continue; }

    if (cont.includes('entfernt') && (cont.includes('Du hast') || cont.includes(' hat '))) {
      lastEvent[snd]='leave'; continue;
    }

    if (SKIP.some(w=>cont.includes(w))) continue;
    if (cont.includes('weggelassen') && !/^\d/.test(cont)) continue;

    if (NUM_RE.test(cont)) {
      posts[snd]=(posts[snd]||0)+1;
      if (!lastD[snd]||d>lastD[snd]) lastD[snd]=d;
      if (!firstD[snd]||d<firstD[snd]) firstD[snd]=d;
      const dk = dayKeyOf(d);
      if (!dailyPosts[snd]) dailyPosts[snd]=[];
      if (dailyPosts[snd].indexOf(dk)===-1) dailyPosts[snd].push(dk);
      lastEvent[snd]='post';
      postEvents.push({name:snd, date:d});
    }
  }

  const now=new Date();
  const fallback=groupCreated||new Date(2025,11,30);

  let globalMaxDate=null;
  Object.values(lastD).forEach(d=>{ if(!globalMaxDate||d>globalMaxDate) globalMaxDate=d; });

  const result=Object.entries(posts).map(([name,count])=>{
    const last=lastD[name];
    const join=joinD[name]||fallback;
    const memDays=Math.max(1,Math.round((now-join)/86400000));
    const daysAgo=Math.floor((now-last)/86400000);
    const ppw=Math.round(count/(memDays/7)*10)/10;
    const streak=calcStreak(dailyPosts[name]||[]);
    const currentStreak=calcCurrentStreak(dailyPosts[name]||[], globalMaxDate);
    const hasLeft = lastEvent[name]==='leave';
    return {name,posts:count,daysAgo,ppw,memDays,streak,currentStreak,hasLeft,
            joinStr:fmt(join),lastStr:fmt(last)};
  }).sort((a,b)=>b.posts-a.posts);

  const totalPosts=result.reduce((s,m)=>s+m.posts,0);
  const updated=now.toLocaleDateString('de-DE',{
    day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

  // Weekly top 3: last 7 days relative to the most recent post date in the export
  let maxDate=null;
  Object.values(lastD).forEach(d=>{ if(!maxDate||d>maxDate) maxDate=d; });
  let weeklyTop3=[];
  if (maxDate) {
    const windowStart = new Date(maxDate); windowStart.setDate(windowStart.getDate()-6);
    const weekCounts={};
    postEvents.forEach(ev=>{
      if (ev.date >= windowStart && ev.date <= maxDate) {
        weekCounts[ev.name]=(weekCounts[ev.name]||0)+1;
      }
    });
    weeklyTop3 = Object.entries(weekCounts)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,3)
      .map(([name,count])=>({name,count}));
  }

  return {members:result,totalPosts,updated,groupCreated:groupCreated||fallback,weeklyTop3};
}

// ---------- history.json builder (full re-derivation from export each time) ----------
function buildHistory(text, groupCreatedFallback) {
  const lines = text.split('\n');
  const dailyPosts = {}; // dayKey -> count
  let groupCreated = null;

  for (const raw of lines) {
    const line = clean(raw);
    const m = MSG_RE.exec(line);
    if (!m) continue;
    const [, dateStr, sender, rawContent] = m;
    const cont=clean(rawContent), d=parseDate(dateStr);
    if (!d) continue;

    if (cont.includes('erstellt') && !groupCreated) { groupCreated=d; continue; }
    if (cont.includes('hinzugefügt') || cont.includes('beigetreten')) continue;
    if (cont.includes('hat die Gruppe verlassen')) continue;
    if (cont.includes('entfernt') && (cont.includes('Du hast') || cont.includes(' hat '))) continue;
    if (SKIP.some(w=>cont.includes(w))) continue;
    if (cont.includes('weggelassen') && !/^\d/.test(cont)) continue;

    if (NUM_RE.test(cont)) {
      const dk = dayKeyOf(d);
      dailyPosts[dk] = (dailyPosts[dk]||0) + 1;
    }
  }

  const start = groupCreated || groupCreatedFallback || new Date(2025,11,30);
  const dayKeys = Object.keys(dailyPosts);
  let end = start;
  dayKeys.forEach(k => { const d=new Date(k); if (d>end) end=d; });
  if (dayKeys.length===0) end = start;

  // Build weekly buckets from start to end
  const weekly = [];
  let cursor = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  let running = 0;
  while (cursor <= end) {
    const weekEnd = new Date(cursor); weekEnd.setDate(weekEnd.getDate()+6);
    let weekTotal = 0;
    let d2 = new Date(cursor);
    while (d2 <= weekEnd && d2 <= end) {
      weekTotal += dailyPosts[dayKeyOf(d2)] || 0;
      d2.setDate(d2.getDate()+1);
    }
    running += weekTotal;
    weekly.push({ weekStart: dayKeyOf(cursor), posts: weekTotal, cumulative: running });
    cursor = new Date(weekEnd); cursor.setDate(cursor.getDate()+1);
  }

  return {
    startDate: dayKeyOf(start),
    endDate: dayKeyOf(end),
    totalPosts: running,
    weekly,
    daily: dailyPosts
  };
}

let token='',repo='',fileContent=null;
function setMsg(id,t,type){const el=document.getElementById(id);el.textContent=t;el.className='msg '+type;}
function setStep(t){document.getElementById('step-text').textContent=t;}
function setProgress(p){document.getElementById('progress').style.display='block';document.getElementById('pbar').style.width=p+'%';}

async function doLogin(){
  const pw=document.getElementById('pw').value.trim();
  const rv=document.getElementById('repo').value.trim();
  if(!pw||!rv){setMsg('login-msg','Please enter token and repo.','err');return;}
  setStep('Checking connection…');
  try{
    const res=await fetch(`https://api.github.com/repos/${rv}`,
      {headers:{Authorization:'token '+pw,'User-Agent':'OMG-Admin'}});
    if(!res.ok) throw new Error('Invalid token or repo.');
    token=pw; repo=rv;
    document.getElementById('login-section').style.display='none';
    document.getElementById('upload-section').style.display='block';
    setStep('Connected ✓  —  now select your export file.');
  }catch(e){setMsg('login-msg',e.message,'err');setStep('');}
}

function handleFile(file){
  const r=new FileReader();
  r.onload=e=>{
    fileContent=e.target.result;
    document.getElementById('drop-zone').querySelector('.drop-title').textContent='✓ '+file.name;
    document.getElementById('upload-btn').disabled=false;
    setStep('File ready — click "Process & upload".');
  };
  r.readAsText(file,'UTF-8');
}
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');
  if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
document.getElementById('file-input').addEventListener('change',
  e=>{if(e.target.files[0])handleFile(e.target.files[0]);});

async function putFile(path, jsonObj, commitMsg) {
  const apiUrl=`https://api.github.com/repos/${repo}/contents/${path}`;
  const b64=btoa(unescape(encodeURIComponent(JSON.stringify(jsonObj,null,2))));
  let sha=null;
  const ex=await fetch(apiUrl,{headers:{Authorization:'token '+token}});
  if(ex.ok) sha=(await ex.json()).sha;
  const put=await fetch(apiUrl,{
    method:'PUT',
    headers:{Authorization:'token '+token,'Content-Type':'application/json'},
    body:JSON.stringify({message:commitMsg,content:b64,...(sha?{sha}:{})})
  });
  if(!put.ok) throw new Error((await put.json()).message||`GitHub API error on ${path}`);
}

async function doUpload(){
  if(!fileContent)return;
  document.getElementById('upload-btn').disabled=true;
  setProgress(10); setStep('Parsing export…');
  let parsed, history;
  try{
    parsed=parseExport(fileContent);
    if(!parsed.members.length) throw new Error('No posts found in file.');
    history=buildHistory(fileContent, parsed.groupCreated);
  }catch(e){
    setMsg('upload-msg','Parse error: '+e.message,'err');
    document.getElementById('upload-btn').disabled=false; return;
  }
  const leftCount=parsed.members.filter(m=>m.hasLeft).length;
  setProgress(35);
  setStep(`${parsed.members.length} members · ${leftCount} have left. Uploading leaderboard…`);

  try{
    await putFile('data/members.json',
      {members:parsed.members, totalPosts:parsed.totalPosts, updated:parsed.updated},
      `Update leaderboard – ${parsed.updated}`);

    setProgress(70);
    setStep('Uploading history…');
    await putFile('data/history.json', history, `Update history – ${parsed.updated}`);

    setProgress(100);
    setMsg('upload-msg',
      `✅ Done! ${parsed.members.length} members (${leftCount} left), ${parsed.totalPosts.toLocaleString('en')} posts. History updated through ${history.endDate}. Live in ~30s.`,
      'ok');
    showRecap(parsed, history);
    setStep('');
    document.getElementById('upload-btn').disabled=false;
  }catch(e){
    setMsg('upload-msg','❌ Upload failed: '+e.message,'err');
    document.getElementById('upload-btn').disabled=false; setStep('');
  }
}

function nextMonday(){
  const d=new Date();
  const day=d.getDay(); // 0=Sun..6=Sat
  const add=(8-day)%7 || 7; // next Monday, always in the future
  d.setDate(d.getDate()+add);
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
}

function showRecap(parsed, history){
  const top3=parsed.weeklyTop3||[];
  const medals=['🥇','🥈','🥉'];
  const top3Lines = top3.length
    ? top3.map((m,i)=>`${medals[i]} ${m.name} – ${m.count} beers this week`).join('\n')
    : 'No data available';

  const daysSinceStart = Math.max(1, Math.round((new Date(history.endDate) - new Date(history.startDate)) / 86400000) + 1);
  const dailyAvg = (parsed.totalPosts / daysSinceStart).toFixed(1);

  const text =
`📊 WEEKLY UPDATE

🍺 Official count: ${parsed.totalPosts.toLocaleString('en')} beers
📈 Daily average: ${dailyAvg} beers/day (all-time)

🏆 Top 3 this week:
${top3Lines}

⚠️ Kick wave: Monday, ${nextMonday()}

Full leaderboard: onemillionbeer.de`;

  document.getElementById('recap-text').value = text;
  document.getElementById('recap-box').style.display = 'block';
}

function copyRecap(){
  const ta=document.getElementById('recap-text');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).catch(()=>{ ta.select(); document.execCommand('copy'); });
  } else {
    ta.select(); document.execCommand('copy');
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
