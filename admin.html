<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · One Million Beer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#FAC775;--amber-dark:#412402;
  --bg:#ffffff;--bg-2:#f7f5f0;--bg-3:#eceae3;
  --text:#1a1917;--text-2:#6b6960;--text-3:#9c9a92;
  --border:rgba(0,0,0,0.09);--border-2:rgba(0,0,0,0.15);
  --red-bg:#FCEBEB;--red-tx:#791F1F;
  --grn-bg:#EAF3DE;--grn-tx:#27500A;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1b1a17;--bg-2:#232219;--bg-3:#2c2b25;
  --text:#f0ede5;--text-2:#9d9a91;--text-3:#6a6860;
  --border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);
  --red-bg:#3a1515;--red-tx:#f5a0a0;--grn-bg:#192e10;--grn-tx:#9fd070
}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--bg-2);border-radius:16px;padding:2rem;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{font-size:32px;margin-bottom:1rem}
h1{font-size:18px;font-weight:700;margin-bottom:.25rem}
.sub{font-size:13px;color:var(--text-2);margin-bottom:1.5rem}
label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
input[type=password],input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border-2);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;margin-bottom:1rem}
input:focus{border-color:var(--amber)}
.drop-zone{border:2px dashed var(--border-2);border-radius:10px;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:.15s;background:var(--bg);margin-bottom:1rem}
.drop-zone:hover,.drop-zone.drag{background:var(--bg-3);border-color:var(--amber)}
.drop-zone .icon{font-size:28px;margin-bottom:.5rem}
.drop-zone .title{font-size:14px;font-weight:500;margin-bottom:4px}
.drop-zone .hint{font-size:12px;color:var(--text-2)}
#file-input{display:none}
button{width:100%;background:var(--amber);border:none;border-radius:8px;padding:10px;font-size:15px;font-weight:600;color:var(--amber-dark);cursor:pointer;font-family:var(--font);transition:.1s}
button:hover{background:#f5b84e}
button:disabled{opacity:.5;cursor:not-allowed}
.msg{border-radius:8px;padding:.75rem 1rem;font-size:13px;margin-top:1rem;display:none}
.msg.ok{background:var(--grn-bg);color:var(--grn-tx);display:block}
.msg.err{background:var(--red-bg);color:var(--red-tx);display:block}
.progress{height:4px;background:var(--bg-3);border-radius:4px;margin-top:1rem;overflow:hidden;display:none}
.progress-bar{height:100%;background:var(--amber);width:0;transition:width .3s;border-radius:4px}
.back{display:block;text-align:center;margin-top:1.25rem;font-size:12px;color:var(--text-3);text-decoration:none}
.back:hover{color:var(--text-2)}
.step{font-size:12px;color:var(--text-3);margin-top:1rem;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🍺</div>
  <h1>One Million Beer · Admin</h1>
  <p class="sub">Neuen WhatsApp-Export hochladen und Dashboard aktualisieren</p>

  <!-- Login section -->
  <div id="login-section">
    <label for="pw">Admin-Token</label>
    <input type="password" id="pw" placeholder="Token eingeben…" autocomplete="off">

    <label>GitHub Repo</label>
    <input type="text" id="repo" placeholder="username/repo-name" value="">

    <button onclick="doLogin()">Weiter</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Upload section (shown after login) -->
  <div id="upload-section" style="display:none">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📂</div>
      <p class="title">WhatsApp-Export hier reinziehen</p>
      <p class="hint">.txt — mit oder ohne Medien</p>
    </div>
    <input type="file" id="file-input" accept=".txt">

    <button id="upload-btn" onclick="doUpload()" disabled>Export verarbeiten & hochladen</button>
    <div class="progress" id="progress"><div class="progress-bar" id="pbar"></div></div>
    <div class="msg" id="upload-msg"></div>
    <p class="step" id="step-text"></p>
  </div>

  <a href="index.html" class="back">← Zum Dashboard</a>
</div>

<script>
// ─── Parser (same logic as local tool) ───────────────────────────────────────
function parseExport(text) {
  const lines = text.split('\n');
  const clean = s => s.replace(/^[\u200e\u200f\u202f\ufeff]+/, '').trim();
  const msgRe = /^\[(\d{1,2}\.\d{1,2}\.\d{2,4}),\s*\d{1,2}:\d{2}(?::\d{2})?\]\s*(.+?):\s*(.*)/;
  const numRe = /^[~#\s]*(\d{1,2}\.?\d{3}(?:\.\d{3})?|\d{3,6})(?:\s*[\u200e]*(?:Bild weggelassen)?[\s.!\u{1F37A}\u{1F37B}\u{1F942}]*)?$/u;
  const joinRe = /hat\s+(.+?)\s+hinzugef/i;
  const skipWords = ['hat die Gruppe','hat die Gruppenbesch','Nachrichten und Anrufe','wurde bearbeitet','hat angefragt','hat ~ ','festgelegt','hat das Gruppen','hat in den Einstellungen','aktiviert','Ende-zu-Ende','Du hast'];

  const posts={}, lastD={}, firstD={}, joinD={};

  function parseDate(ds) {
    const p = ds.split('.');
    try { const y = p[2].length===2 ? 2000 + +p[2] : +p[2]; return new Date(y, +p[1]-1, +p[0]); }
    catch { return null; }
  }
  function fmt(d) {
    if (!d) return '?';
    return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
  }

  for (const raw of lines) {
    const line = clean(raw);
    const m = msgRe.exec(line);
    if (!m) continue;
    const [, dateStr, sender, rawContent] = m;
    const snd  = sender.trim();
    const cont = clean(rawContent);
    const d    = parseDate(dateStr);
    if (!d) continue;
    if (cont.includes('hinzugefügt') || cont.includes('beigetreten')) {
      const jm = joinRe.exec(cont);
      if (jm && !joinD[jm[1].trim()]) joinD[jm[1].trim()] = d;
      if (cont.includes('beigetreten') && !joinD[snd]) joinD[snd] = d;
      continue;
    }
    if (skipWords.some(w => cont.includes(w))) continue;
    if (cont.includes('weggelassen') && !/^\d/.test(cont)) continue;
    if (numRe.test(cont)) {
      posts[snd] = (posts[snd] || 0) + 1;
      if (!lastD[snd]  || d > lastD[snd])  lastD[snd]  = d;
      if (!firstD[snd] || d < firstD[snd]) firstD[snd] = d;
    }
  }

  const now = new Date();
  const result = Object.entries(posts).map(([name, count]) => {
    const last  = lastD[name];
    const first = firstD[name];
    const join  = joinD[name] || first;
    const memDays = Math.max(1, Math.round((now - join) / 86400000));
    const daysAgo = Math.round((now - last) / 86400000);
    const ppw = Math.round((count / (memDays / 7)) * 10) / 10;
    return { name, posts: count, daysAgo, ppw, memDays, joinStr: fmt(join), lastStr: fmt(last) };
  }).sort((a,b) => b.posts - a.posts);

  const totalPosts = result.reduce((s,m) => s + m.posts, 0);
  const updated = new Date().toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  return { members: result, totalPosts, updated };
}

// ─── State ────────────────────────────────────────────────────────────────────
let token = '', repo = '', fileContent = null, fileName = '';

function setMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}
function setStep(t) { document.getElementById('step-text').textContent = t; }
function setProgress(pct) {
  document.getElementById('progress').style.display = 'block';
  document.getElementById('pbar').style.width = pct + '%';
}

// ─── Login ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pw   = document.getElementById('pw').value.trim();
  const repoVal = document.getElementById('repo').value.trim();
  if (!pw || !repoVal) { setMsg('login-msg','Bitte Token und Repo eingeben.','err'); return; }

  setStep('Verbindung wird geprüft…');
  try {
    const res = await fetch(`https://api.github.com/repos/${repoVal}`, {
      headers: { Authorization: 'token ' + pw, 'User-Agent': 'OMG-Admin' }
    });
    if (!res.ok) throw new Error('Token oder Repo ungültig.');
    token = pw; repo = repoVal;
    document.getElementById('login-section').style.display  = 'none';
    document.getElementById('upload-section').style.display = 'block';
    setStep('Eingeloggt. Export auswählen.');
  } catch(e) {
    setMsg('login-msg', e.message, 'err');
    setStep('');
  }
}

// ─── File select ──────────────────────────────────────────────────────────────
function handleFile(file) {
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    fileContent = e.target.result;
    document.getElementById('drop-zone').querySelector('.title').textContent = `✓ ${file.name}`;
    document.getElementById('upload-btn').disabled = false;
    setStep('Datei bereit. Jetzt hochladen.');
  };
  reader.readAsText(file, 'UTF-8');
}

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
document.getElementById('file-input').addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

// ─── Upload ───────────────────────────────────────────────────────────────────
async function doUpload() {
  if (!fileContent) return;
  document.getElementById('upload-btn').disabled = true;
  setProgress(10); setStep('Export wird geparst…');

  let parsed;
  try {
    parsed = parseExport(fileContent);
    if (!parsed.members.length) throw new Error('Keine Posts gefunden.');
  } catch(e) {
    setMsg('upload-msg', 'Parse-Fehler: ' + e.message, 'err');
    document.getElementById('upload-btn').disabled = false;
    return;
  }

  setProgress(40); setStep(`${parsed.members.length} Mitglieder verarbeitet. Hochladen…`);

  const jsonStr = JSON.stringify(parsed, null, 2);
  const b64     = btoa(unescape(encodeURIComponent(jsonStr)));
  const path    = 'data/members.json';
  const apiUrl  = `https://api.github.com/repos/${repo}/contents/${path}`;

  try {
    // Get current SHA if file exists
    let sha = null;
    const existing = await fetch(apiUrl, { headers: { Authorization: 'token ' + token } });
    if (existing.ok) {
      const ex = await existing.json();
      sha = ex.sha;
    }
    setProgress(65); setStep('Datei wird commitet…');

    const body = {
      message: `Update members.json – ${parsed.updated}`,
      content: b64,
      ...(sha ? { sha } : {})
    };

    const put = await fetch(apiUrl, {
      method:  'PUT',
      headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
      body:    JSON.stringify(body)
    });

    if (!put.ok) {
      const err = await put.json();
      throw new Error(err.message || 'GitHub API Fehler');
    }

    setProgress(100);
    setMsg('upload-msg',
      `✅ Erfolgreich! ${parsed.members.length} Mitglieder, ${parsed.totalPosts.toLocaleString('de')} Posts. Dashboard wird in ~30 Sekunden aktualisiert.`,
      'ok');
    setStep('');
    document.getElementById('upload-btn').disabled = false;
  } catch(e) {
    setMsg('upload-msg', '❌ Upload fehlgeschlagen: ' + e.message, 'err');
    document.getElementById('upload-btn').disabled = false;
    setStep('');
  }
}

// Enter key on password
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
