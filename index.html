<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Million Beer 🍺</title>
<meta property="og:title" content="One Million Beer">
<meta property="og:description" content="Group leaderboard · Who drinks the most?">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#FAC775;--amber-dark:#412402;--amber-mid:#8B5A00;
  --bg:#fff;--bg-2:#f7f5f0;--bg-3:#eceae3;
  --text:#1a1917;--text-2:#6b6960;--text-3:#9c9a92;
  --border:rgba(0,0,0,0.09);--border-2:rgba(0,0,0,0.15);
  --red-bg:#FCEBEB;--red-tx:#791F1F;
  --amb-bg:#FEF3E2;--amb-tx:#7A4500;
  --grn-bg:#EAF3DE;--grn-tx:#27500A;
  --blu-bg:#E8F1FB;--blu-tx:#185FA5;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1b1a17;--bg-2:#232219;--bg-3:#2c2b25;
  --text:#f0ede5;--text-2:#9d9a91;--text-3:#6a6860;
  --border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);
  --red-bg:#3a1515;--red-tx:#f5a0a0;
  --amb-bg:#3a2800;--amb-tx:#f5c070;
  --grn-bg:#192e10;--grn-tx:#9fd070;
  --blu-bg:#101f38;--blu-tx:#80b5f0
}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.page{max-width:980px;margin:0 auto;padding:2rem 1.25rem 5rem}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:1.75rem;flex-wrap:wrap}
.logo{width:50px;height:50px;border-radius:14px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;box-shadow:0 2px 8px rgba(250,199,117,0.35)}
.hdr-text h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
.hdr-text p{font-size:13px;color:var(--text-2);margin-top:3px}
.counter-pill{margin-left:auto;background:var(--amber);color:var(--amber-dark);font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px}
#loading{text-align:center;padding:4rem 2rem;color:var(--text-2)}
.spinner{width:32px;height:32px;border:3px solid var(--border-2);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px;margin-bottom:1.5rem}
.mc{background:var(--bg-2);border-radius:10px;padding:.75rem 1rem}
.mc .l{font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mc .v{font-size:22px;font-weight:700}
.mc.red .v{color:#c0392b}.mc.amb .v{color:var(--amber-mid)}.mc.grn .v{color:#3B6D11}.mc.blu .v{color:#185FA5}
@media(prefers-color-scheme:dark){.mc.red .v{color:#f5a0a0}.mc.grn .v{color:#9fd070}.mc.blu .v{color:#80b5f0}}
.toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:1.25rem}
.search-wrap{flex:1;min-width:160px;position:relative}
.search-wrap input{width:100%;background:var(--bg-2);border:1px solid var(--border-2);border-radius:8px;padding:8px 12px 8px 34px;font-size:13px;color:var(--text);font-family:var(--font);outline:none}
.search-wrap input:focus{border-color:var(--amber)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:14px;pointer-events:none}
.sort-label{font-size:12px;color:var(--text-2);white-space:nowrap}
.sort-btn{background:var(--bg-2);border:1px solid var(--border-2);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text-2);cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.sort-btn:hover{background:var(--bg-3);color:var(--text)}
.sort-btn.active{background:var(--amber);border-color:transparent;color:var(--amber-dark);font-weight:600}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:1rem}
.tb{padding:7px 16px;font-size:13px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-2);cursor:pointer;font-family:var(--font);margin-bottom:-1px;transition:color .15s;white-space:nowrap}
.tb:hover{color:var(--text)}.tb.on{color:var(--text);border-bottom-color:var(--amber);font-weight:500}
.cnt{font-size:11px;opacity:.65}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:7px 9px;font-size:10px;font-weight:600;color:var(--text-2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid var(--border);word-break:break-word}
tr:hover td{background:var(--bg-2)}
.rank{color:var(--text-3);font-size:11px}
.bdg{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bdg.k{background:var(--red-bg);color:var(--red-tx)}
.bdg.r{background:var(--amb-bg);color:var(--amb-tx)}
.bdg.n{background:var(--blu-bg);color:var(--blu-tx)}
.bdg.o{background:var(--grn-bg);color:var(--grn-tx)}
.bar-bg{background:var(--bg-3);border-radius:3px;height:4px;width:100%;margin-top:4px}
.bar-f{height:4px;border-radius:3px;background:var(--amber)}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;padding:.75rem 1rem;background:var(--bg-2);border-radius:8px;font-size:12px;color:var(--text-2)}
.leg-item{display:flex;align-items:center;gap:5px}
.pg{display:flex;gap:8px;align-items:center;margin-top:1rem;font-size:13px;color:var(--text-2);flex-wrap:wrap}
.pg button{background:var(--bg-2);border:1px solid var(--border-2);border-radius:6px;padding:5px 12px;font-size:13px;color:var(--text);cursor:pointer;font-family:var(--font)}
.pg button:disabled{opacity:.4;cursor:not-allowed}
.pg button:hover:not(:disabled){background:var(--bg-3)}
.footer{margin-top:3rem;text-align:center;font-size:11px;color:var(--text-3)}
.footer a{color:var(--text-3);text-decoration:none}.footer a:hover{color:var(--text-2)}
.error-box{background:var(--red-bg);color:var(--red-tx);border-radius:10px;padding:1rem 1.25rem;font-size:13px;margin-bottom:1rem}
.empty{text-align:center;padding:3rem;color:var(--text-3);font-size:14px}
.streak-fire{font-size:11px}
@media(max-width:620px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  th:nth-child(5),td:nth-child(5),th:nth-child(6),td:nth-child(6){display:none}
  .counter-pill{display:none}
}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="logo">🍺</div>
    <div class="hdr-text">
      <h1>One Million Beer</h1>
      <p>Group leaderboard · Last update: <span id="stand">loading…</span></p>
    </div>
    <div class="counter-pill" id="counter-pill"></div>
  </div>

  <div id="error-box"></div>
  <div id="loading"><div class="spinner"></div><p>Loading data…</p></div>

  <div id="app" style="display:none">
    <div class="metrics" id="mrow"></div>

    <div class="legend">
      <div class="leg-item"><span class="bdg o">Active</span> posting regularly</div>
      <div class="leg-item"><span class="bdg n">New</span> joined &lt;30 days ago</div>
      <div class="leg-item"><span class="bdg r">At-risk</span> &lt;1 post/week average</div>
      <div class="leg-item"><span class="bdg k">Kick</span> &lt;5 posts total or 30+ days inactive</div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="srch" placeholder="Search by name…">
      </div>
      <span class="sort-label">Sort by:</span>
      <button class="sort-btn active" onclick="setSort('posts',this)">Total posts</button>
      <button class="sort-btn" onclick="setSort('ppw',this)">Posts/week</button>
      <button class="sort-btn" onclick="setSort('mem',this)">Longest member</button>
      <button class="sort-btn" onclick="setSort('streak',this)">🔥 Best streak</button>
    </div>

    <div class="tabs">
      <button class="tb on" onclick="sw('all',this)">All</button>
      <button class="tb" onclick="sw('kick',this)">Kick <span class="cnt" id="cnt-k"></span></button>
      <button class="tb" onclick="sw('risk',this)">At-risk <span class="cnt" id="cnt-r"></span></button>
      <button class="tb" onclick="sw('new',this)">New <span class="cnt" id="cnt-n"></span></button>
      <button class="tb" onclick="sw('top',this)">Top 20</button>
    </div>

    <div class="tw">
      <table>
        <thead><tr>
          <th style="width:28px">#</th>
          <th style="width:25%">Member</th>
          <th style="width:75px">Posts</th>
          <th style="width:72px">P/week</th>
          <th style="width:105px">🔥 Longest streak</th>
          <th style="width:90px">Last post</th>
          <th style="width:88px">Since</th>
          <th style="width:78px">Status</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pg" id="pgrow"></div>
  </div>

  <div class="footer"><a href="admin.html">⚙ Admin</a></div>
</div>

<script>
const DATA_URL = 'data/members.json';
const KT = 5, ND = 30, RP = 1.0, KICK_DAYS = 30;
const PER = 50;
let members = [], tab = 'all', sort = 'posts', page = 0;

function status(m) {
  if (m.memDays < ND) return 'n';
  if (m.posts < KT || m.daysAgo > KICK_DAYS) return 'k';
  if (m.ppw < RP) return 'r';
  return 'o';
}

async function boot() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('No data found. Please upload an export via the admin page.');
    const json = await res.json();
    members = json.members || [];
    document.getElementById('stand').textContent = json.updated || '?';
    document.getElementById('counter-pill').textContent = '🍺 ' + (json.totalPosts||0).toLocaleString('en') + ' beers';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-box').innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`;
  }
}

function sw(t, btn) {
  tab = t; page = 0;
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); render();
}
function setSort(s, btn) {
  sort = s; page = 0;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function goPage(d) { page = Math.max(0, page + d); render(); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  let src = q ? members.filter(m => m.name.toLowerCase().includes(q)) : members;

  let filtered;
  if      (tab === 'kick') filtered = src.filter(m => status(m) === 'k');
  else if (tab === 'risk') filtered = src.filter(m => status(m) === 'r');
  else if (tab === 'new')  filtered = src.filter(m => status(m) === 'n');
  else if (tab === 'top')  filtered = [...src].sort((a,b) => b.posts - a.posts).slice(0,20);
  else filtered = src;

  const sorted = [...filtered].sort((a,b) => {
    if (sort === 'ppw')    return b.ppw    - a.ppw;
    if (sort === 'mem')    return b.memDays - a.memDays;
    if (sort === 'streak') return (b.streak||0) - (a.streak||0);
    return b.posts - a.posts;
  });

  const kc = members.filter(m => status(m) === 'k').length;
  const rc = members.filter(m => status(m) === 'r').length;
  const nc = members.filter(m => status(m) === 'n').length;
  document.getElementById('cnt-k').textContent = kc ? `(${kc})` : '';
  document.getElementById('cnt-r').textContent = rc ? `(${rc})` : '';
  document.getElementById('cnt-n').textContent = nc ? `(${nc})` : '';

  const total = members.reduce((s,m) => s + m.posts, 0);
  document.getElementById('mrow').innerHTML = `
    <div class="mc"><div class="l">Members</div><div class="v">${members.length}</div></div>
    <div class="mc"><div class="l">Posts counted</div><div class="v">${total.toLocaleString('en')}</div></div>
    <div class="mc grn"><div class="l">Active</div><div class="v">${members.length-kc-rc-nc}</div></div>
    <div class="mc amb"><div class="l">At-risk</div><div class="v">${rc}</div></div>
    <div class="mc red"><div class="l">Kick</div><div class="v">${kc}</div></div>
    <div class="mc blu"><div class="l">New (&lt;30d)</div><div class="v">${nc}</div></div>
  `;

  const maxP = members[0]?.posts || 1;
  const start = page * PER;
  const slice = sorted.slice(start, start + PER);
  const tbody = document.getElementById('tbody');

  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">No entries in this view</td></tr>`;
  } else {
    tbody.innerHTML = slice.map((m,i) => {
      const s = status(m);
      const pct = Math.round(m.posts / maxP * 100);
      const last = m.daysAgo === 0 ? 'today' : m.daysAgo === 1 ? 'yesterday' : `${m.daysAgo}d ago`;
      const streakVal = m.streak || 0;
      const streakDisplay = streakVal >= 7 ? `🔥 ${streakVal}d` : `${streakVal}d`;
      const badge = s==='k' ? `<span class="bdg k">Kick</span>`
                  : s==='r' ? `<span class="bdg r">At-risk</span>`
                  : s==='n' ? `<span class="bdg n">New</span>`
                  :           `<span class="bdg o">Active</span>`;
      return `<tr>
        <td class="rank">${start+i+1}</td>
        <td style="font-size:12px">${esc(m.name)}</td>
        <td><span style="font-weight:600">${m.posts}</span>
          <div class="bar-bg"><div class="bar-f" style="width:${pct}%"></div></div></td>
        <td style="color:var(--text-2)">${m.ppw}</td>
        <td style="color:var(--text-2);font-size:12px">${streakDisplay}</td>
        <td style="color:var(--text-2);font-size:12px">${last}</td>
        <td style="color:var(--text-2);font-size:12px">${m.joinStr}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('');
  }

  const pages = Math.ceil(sorted.length / PER);
  document.getElementById('pgrow').innerHTML = pages <= 1
    ? `<span>${sorted.length} members</span>`
    : `<button onclick="goPage(-1)" ${page===0?'disabled':''}>← Back</button>
       <span>Page ${page+1} of ${pages} · ${sorted.length} members</span>
       <button onclick="goPage(1)" ${page>=pages-1?'disabled':''}>Next →</button>`;
}

document.getElementById('srch').addEventListener('input', () => { page=0; render(); });
boot();
</script>
</body>
</html>
