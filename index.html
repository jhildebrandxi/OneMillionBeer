<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Million Beer 🍺</title>
<meta property="og:title" content="One Million Beer">
<meta property="og:description" content="Gruppenleaderboard · Wer trinkt am meisten?">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#FAC775;--amber-dark:#412402;--amber-mid:#8B5A00;
  --bg:#ffffff;--bg-2:#f7f5f0;--bg-3:#eceae3;
  --text:#1a1917;--text-2:#6b6960;--text-3:#9c9a92;
  --border:rgba(0,0,0,0.09);--border-2:rgba(0,0,0,0.15);
  --red-bg:#FCEBEB;--red-tx:#791F1F;
  --amb-bg:#FEF3E2;--amb-tx:#7A4500;
  --grn-bg:#EAF3DE;--grn-tx:#27500A;
  --blu-bg:#E8F1FB;--blu-tx:#185FA5;
  --r:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1b1a17;--bg-2:#232219;--bg-3:#2c2b25;
  --text:#f0ede5;--text-2:#9d9a91;--text-3:#6a6860;
  --border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);
  --red-bg:#3a1515;--red-tx:#f5a0a0;
  --amb-bg:#3a2800;--amb-tx:#f5c070;
  --grn-bg:#192e10;--grn-tx:#9fd070;
  --blu-bg:#101f38;--blu-tx:#80b5f0
}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.page{max-width:980px;margin:0 auto;padding:2rem 1.25rem 5rem}

/* Header */
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:1.75rem}
.logo{width:50px;height:50px;border-radius:14px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;box-shadow:0 2px 8px rgba(250,199,117,0.4)}
.hdr-text h1{font-size:22px;font-weight:700;letter-spacing:-0.4px}
.hdr-text p{font-size:13px;color:var(--text-2);margin-top:3px}
.last-update{margin-left:auto;font-size:11px;color:var(--text-3);text-align:right;white-space:nowrap}

/* Loading */
#loading{text-align:center;padding:4rem 2rem;color:var(--text-2)}
.spinner{width:32px;height:32px;border:3px solid var(--border-2);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px;margin-bottom:1.5rem}
.mc{background:var(--bg-2);border-radius:10px;padding:.75rem 1rem}
.mc .l{font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mc .v{font-size:22px;font-weight:700}
.mc.red .v{color:#c0392b}.mc.amb .v{color:var(--amber-mid)}.mc.grn .v{color:#3B6D11}.mc.blu .v{color:#185FA5}
@media(prefers-color-scheme:dark){.mc.red .v{color:#f5a0a0}.mc.grn .v{color:#9fd070}.mc.blu .v{color:#80b5f0}}

/* Controls */
.controls{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:1.25rem}
.cg{display:flex;align-items:center;gap:7px;background:var(--bg-2);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text-2)}
input[type=number],input[type=text]{background:var(--bg);border:1px solid var(--border-2);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--text);font-family:var(--font);outline:none}
input[type=number]{width:58px}input[type=text]{width:145px}
input:focus{border-color:var(--amber)}
button{background:var(--bg-2);border:1px solid var(--border-2);border-radius:6px;padding:6px 14px;font-size:13px;color:var(--text);cursor:pointer;font-family:var(--font);transition:background .1s}
button:hover{background:var(--bg-3)}
button.primary{background:var(--amber);border-color:transparent;color:var(--amber-dark);font-weight:600}
button.primary:hover{background:#f5b84e}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:1rem}
.tb{padding:7px 16px;font-size:13px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-2);cursor:pointer;font-family:var(--font);margin-bottom:-1px;transition:color .15s}
.tb:hover{color:var(--text)}.tb.on{color:var(--text);border-bottom-color:var(--amber);font-weight:500}
.cnt{font-size:11px;opacity:.7}

/* Sort row */
.sort-row{display:flex;gap:6px;align-items:center;margin-bottom:.9rem;font-size:12px;color:var(--text-2);flex-wrap:wrap}
.sort-row button{font-size:11px;padding:3px 10px}
.sort-row button.active{background:var(--amber);border-color:transparent;color:var(--amber-dark);font-weight:600}

/* Table */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:7px 9px;font-size:10px;font-weight:600;color:var(--text-2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid var(--border);word-break:break-word}
tr:hover td{background:var(--bg-2)}
.rank{color:var(--text-3);font-size:11px}

/* Badges */
.bdg{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bdg.k{background:var(--red-bg);color:var(--red-tx)}
.bdg.r{background:var(--amb-bg);color:var(--amb-tx)}
.bdg.n{background:var(--blu-bg);color:var(--blu-tx)}
.bdg.o{background:var(--grn-bg);color:var(--grn-tx)}

/* Bar */
.bar-bg{background:var(--bg-3);border-radius:3px;height:4px;width:100%;margin-top:4px}
.bar-f{height:4px;border-radius:3px;background:var(--amber)}

/* Pagination */
.pg{display:flex;gap:8px;align-items:center;margin-top:1rem;font-size:13px;color:var(--text-2);flex-wrap:wrap}

/* Admin link */
.admin-link{display:block;text-align:center;margin-top:3rem;font-size:11px;color:var(--text-3);text-decoration:none;opacity:.5}
.admin-link:hover{opacity:1}

.empty{text-align:center;padding:3rem;color:var(--text-3);font-size:14px}
.error-box{background:var(--red-bg);color:var(--red-tx);border-radius:10px;padding:1rem 1.25rem;font-size:13px;margin-bottom:1rem}

@media(max-width:600px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  th:nth-child(4),td:nth-child(4),th:nth-child(6),td:nth-child(6){display:none}
}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="logo">🍺</div>
    <div class="hdr-text">
      <h1>One Million Beer</h1>
      <p>Gruppenleaderboard · Stand: <span id="stand">wird geladen…</span></p>
    </div>
    <div class="last-update" id="counter-display"></div>
  </div>

  <div id="error-box"></div>
  <div id="loading"><div class="spinner"></div><p>Daten werden geladen…</p></div>
  <div id="app" style="display:none">

    <div class="metrics" id="mrow"></div>

    <div class="controls">
      <div class="cg"><label>Kick unter</label><input type="number" id="kt" value="5" min="1"><label>Posts</label></div>
      <div class="cg"><label>Neu-Schutz</label><input type="number" id="nd" value="30" min="1"><label>Tage</label></div>
      <div class="cg"><label>At-risk unter</label><input type="number" id="rp" value="1" min="0" step="0.1"><label>Posts/Woche</label></div>
      <div class="cg"><input type="text" id="srch" placeholder="Name suchen…"></div>
      <button class="primary" onclick="applyAll()">Anwenden</button>
    </div>

    <div class="tabs">
      <button class="tb on" onclick="sw('all',this)">Alle</button>
      <button class="tb" onclick="sw('kick',this)">Kick <span class="cnt" id="cnt-k"></span></button>
      <button class="tb" onclick="sw('risk',this)">At-risk <span class="cnt" id="cnt-r"></span></button>
      <button class="tb" onclick="sw('new',this)">Neu <span class="cnt" id="cnt-n"></span></button>
      <button class="tb" onclick="sw('top',this)">Top 20</button>
    </div>

    <div class="sort-row">
      Sortieren:
      <button onclick="setSort('posts')" id="s-posts" class="active">Posts gesamt</button>
      <button onclick="setSort('ppw')" id="s-ppw">Posts/Woche</button>
      <button onclick="setSort('days')" id="s-days">Inaktivität</button>
      <button onclick="setSort('mem')" id="s-mem">Mitglied seit</button>
    </div>

    <div class="tw">
      <table>
        <thead><tr>
          <th style="width:30px">#</th>
          <th style="width:27%">Mitglied</th>
          <th style="width:80px">Posts</th>
          <th style="width:75px">P/Woche</th>
          <th style="width:105px">Letzter Post</th>
          <th style="width:90px">Dabei seit</th>
          <th style="width:85px">Status</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pg" id="pgrow"></div>

  </div><!-- /app -->

  <a href="admin.html" class="admin-link">⚙ Admin</a>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const DATA_URL = 'data/members.json';

// ─── State ────────────────────────────────────────────────────────────────────
let members = [];
let tab = 'all', sort = 'posts', page = 0;
const PER = 50;
let kt = 5, nd = 30, rp = 1.0;

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('Keine Daten gefunden. Bitte erst einen Export hochladen.');
    const json = await res.json();
    members = json.members || [];
    document.getElementById('stand').textContent = json.updated || '?';
    document.getElementById('counter-display').textContent = `🍺 Counter: ${(json.totalPosts||0).toLocaleString('de')}`;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-box').innerHTML =
      `<div class="error-box">⚠️ ${e.message}</div>`;
  }
}

// ─── Status ───────────────────────────────────────────────────────────────────
function status(m) {
  if (m.memDays < nd)  return 'n';
  if (m.posts   < kt)  return 'k';
  if (m.ppw     < rp)  return 'r';
  return 'o';
}

// ─── Render ───────────────────────────────────────────────────────────────────
function applyAll() {
  kt = parseInt(document.getElementById('kt').value)    || 5;
  nd = parseInt(document.getElementById('nd').value)    || 30;
  rp = parseFloat(document.getElementById('rp').value)  || 1.0;
  page = 0; render();
}
function sw(t, btn) {
  tab = t; page = 0;
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); render();
}
function setSort(s) {
  sort = s; page = 0;
  document.querySelectorAll('.sort-row button').forEach(b => b.classList.remove('active'));
  document.getElementById('s-' + s).classList.add('active'); render();
}
function goPage(d) { page = Math.max(0, page + d); render(); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  let src = q ? members.filter(m => m.name.toLowerCase().includes(q)) : members;

  let filtered;
  if      (tab === 'kick') filtered = src.filter(m => status(m) === 'k');
  else if (tab === 'risk') filtered = src.filter(m => status(m) === 'r');
  else if (tab === 'new')  filtered = src.filter(m => status(m) === 'n');
  else if (tab === 'top')  filtered = [...src].sort((a,b) => b.posts - a.posts).slice(0, 20);
  else filtered = src;

  const sorted = [...filtered].sort((a, b) => {
    if (sort === 'ppw')  return b.ppw     - a.ppw;
    if (sort === 'days') return b.daysAgo - a.daysAgo;
    if (sort === 'mem')  return a.memDays - b.memDays;
    return b.posts - a.posts;
  });

  // Tab counts
  const kc = members.filter(m => status(m) === 'k').length;
  const rc = members.filter(m => status(m) === 'r').length;
  const nc = members.filter(m => status(m) === 'n').length;
  document.getElementById('cnt-k').textContent = kc ? `(${kc})` : '';
  document.getElementById('cnt-r').textContent = rc ? `(${rc})` : '';
  document.getElementById('cnt-n').textContent = nc ? `(${nc})` : '';

  // Metrics
  const total = members.reduce((s, m) => s + m.posts, 0);
  document.getElementById('mrow').innerHTML = `
    <div class="mc"><div class="l">Mitglieder</div><div class="v">${members.length}</div></div>
    <div class="mc"><div class="l">Posts erkannt</div><div class="v">${total.toLocaleString('de')}</div></div>
    <div class="mc red"><div class="l">Kick-Kandidaten</div><div class="v">${kc}</div></div>
    <div class="mc amb"><div class="l">At-risk</div><div class="v">${rc}</div></div>
    <div class="mc blu"><div class="l">Neu (&lt;${nd}d)</div><div class="v">${nc}</div></div>
    <div class="mc grn"><div class="l">Aktiv</div><div class="v">${members.length - kc - rc - nc}</div></div>
  `;

  // Table
  const maxP  = members[0]?.posts || 1;
  const start = page * PER;
  const slice = sorted.slice(start, start + PER);
  const tbody = document.getElementById('tbody');

  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">Keine Einträge</td></tr>`;
  } else {
    tbody.innerHTML = slice.map((m, i) => {
      const s   = status(m);
      const pct = Math.round(m.posts / maxP * 100);
      const last = m.daysAgo === 0 ? 'heute' : m.daysAgo === 1 ? 'gestern' : `vor ${m.daysAgo}d`;
      const badge = s === 'k' ? `<span class="bdg k">Kick</span>`
                  : s === 'r' ? `<span class="bdg r">At-risk</span>`
                  : s === 'n' ? `<span class="bdg n">Neu</span>`
                  :             `<span class="bdg o">Aktiv</span>`;
      return `<tr>
        <td class="rank">${start + i + 1}</td>
        <td style="font-size:12px">${esc(m.name)}</td>
        <td><span style="font-weight:600">${m.posts}</span>
          <div class="bar-bg"><div class="bar-f" style="width:${pct}%"></div></div></td>
        <td style="color:var(--text-2)">${m.ppw}</td>
        <td style="color:var(--text-2);font-size:12px">${last}</td>
        <td style="color:var(--text-2);font-size:12px">${m.joinStr}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('');
  }

  // Pagination
  const pages = Math.ceil(sorted.length / PER);
  document.getElementById('pgrow').innerHTML = pages <= 1
    ? `<span>${sorted.length} Einträge</span>`
    : `<button onclick="goPage(-1)" ${page===0?'disabled':''}>← Zurück</button>
       <span>Seite ${page+1} von ${pages} · ${sorted.length} Einträge</span>
       <button onclick="goPage(1)" ${page>=pages-1?'disabled':''}>Weiter →</button>`;
}

document.getElementById('srch').addEventListener('input', () => { page = 0; render(); });
boot();
</script>
</body>
</html>
